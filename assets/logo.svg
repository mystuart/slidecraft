<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Slidecraft">
  <!-- 主 logo：层叠卡片 mark（手牌扇开）+ Slidecraft wordmark 横排 -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <!-- mark（同 logo-mark.svg，缩放嵌入左侧 64×64） -->
    <rect x="6" y="20" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.3" transform="rotate(-9 23 37)"/>
    <rect x="11" y="14" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.55" transform="rotate(-4 28 31)"/>
    <rect x="16" y="8" width="34" height="34" rx="7" fill="#8b7dd8"/>
    <text x="33" y="25" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">S</text>
    <!-- wordmark -->
    <text x="66" y="42" font-size="30" font-weight="800" fill="#2a2538" letter-spacing="-0.5">Slidecraft</text>
  </g>
</svg>
