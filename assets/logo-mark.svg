<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Slidecraft">
  <!-- 层叠卡片 mark：3 张圆角卡片像扑克手牌扇开（后两层旋转，前层正向带白 S） -->
  <!-- 灵动感来自：收紧间距 + 后层轻微旋转（-9° / -4°），致敬 craft/slide -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- 后层（旋转 -9°，opacity 0.3，最深） -->
    <rect x="6" y="20" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.3" transform="rotate(-9 23 37)"/>
    <!-- 中层（旋转 -4°，opacity 0.55） -->
    <rect x="11" y="14" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.55" transform="rotate(-4 28 31)"/>
    <!-- 前层（实心紫，正向，带白 S） -->
    <rect x="16" y="8" width="34" height="34" rx="7" fill="#8b7dd8"/>
    <!-- 白色 S（居中于前层 16,8 ~ 50,42 → center 33,25） -->
    <text x="33" y="25" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">S</text>
  </g>
</svg>
