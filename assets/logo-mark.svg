<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Slidecraft">
  <!-- 层叠卡片 mark：3 张圆角卡片阶梯层叠（左下→右上），致敬 craft/slide -->
  <!-- 中后层半透紫制造深度，前层实心紫 + 白 S -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- 后层（最深，opacity 0.3） -->
    <rect x="6" y="22" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.3"/>
    <!-- 中层（opacity 0.55，右上偏移） -->
    <rect x="14" y="14" width="34" height="34" rx="7" fill="#8b7dd8" opacity="0.55"/>
    <!-- 前层（实心紫） -->
    <rect x="22" y="6" width="34" height="34" rx="7" fill="#8b7dd8"/>
    <!-- 白色 S（居中于前层 22,6 ~ 56,40 → center 39,23） -->
    <text x="39" y="23" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">S</text>
  </g>
</svg>
