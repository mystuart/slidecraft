<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Slidecraft">
  <!-- 反白版：深色背景用。mark + wordmark 全白，S 用品牌紫与白前层对比 -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <!-- mark：后两层用白 opacity 制造深度，前层实心白，后两层手牌扇开 -->
    <rect x="6" y="20" width="34" height="34" rx="7" fill="#ffffff" opacity="0.3" transform="rotate(-9 23 37)"/>
    <rect x="11" y="14" width="34" height="34" rx="7" fill="#ffffff" opacity="0.55" transform="rotate(-4 28 31)"/>
    <rect x="16" y="8" width="34" height="34" rx="7" fill="#ffffff"/>
    <!-- S 用品牌紫（与白前层对比，反相版的视觉锚点） -->
    <text x="33" y="25" font-size="24" font-weight="800" fill="#8b7dd8" text-anchor="middle" dominant-baseline="middle">S</text>
    <!-- wordmark -->
    <text x="66" y="42" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Slidecraft</text>
  </g>
</svg>
