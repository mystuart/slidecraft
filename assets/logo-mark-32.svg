<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Slidecraft">
  <!-- 32×32 favicon 优化版：手牌扇开，一个旋转后层角 + 前层实心 + 白 S -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- 后层角（旋转 -8°，左下，制造"还有卡片在后面"的暗示） -->
    <rect x="3" y="13" width="14" height="14" rx="3.5" fill="#6c5db8" transform="rotate(-8 10 20)"/>
    <!-- 前层（实心紫，居中偏右上） -->
    <rect x="10" y="6" width="18" height="18" rx="3.5" fill="#8b7dd8"/>
    <!-- 白色 S（居中前层 10,6 ~ 28,24 → center 19,15） -->
    <text x="19" y="15" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">S</text>
  </g>
</svg>
